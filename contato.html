<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Yab Curves</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <link href="contato.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="home.html">Inicial</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="sobre.html">Sobre-Nós</a></li>
            <li><a href="contato.html">Contato</a></li>
            <div class="indicador"></div>
        </ul>
    </nav>
    <div class="container">
        <div class="heading">
            <h2>Contato</h2>
        </div>
        <form class="form" id="contactForm">
            <label>Nome</label>
            <input type="text" name="Nome" placeholder="Informe seu nome" required>
            <label>E-mail</label>
            <input type="email" name="email" placeholder="Informe seu email" required>
            <label>Mensagem</label>
            <textarea name="mensagem" rows="4" required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </div>

    <main></main>

    <footer>
        <div id="footer_content">
            <div id="footer_contacts">

                <!-- ESQUERDA: Logo -->
                <div id="footer_logo">
                    <img src="yab_logo_rosa.png.png" alt="Logo YAB Moda Plus Size" width="130" height="130">
                </div>

                <!-- CENTRO: Links + Redes sociais -->
                <div id="footer_center">
                    <ul class="footer-list">
                        <li><a href="home.html">Inicial</a></li>
                        <li><a href="produtos.html">Produtos</a></li>
                        <li><a href="sobre.html">Sobre-Nós</a></li>
                        <li><a href="contato.html">Contato</a></li>
                    </ul>

                    <div id="footer_social_midia">
                        <a href="#" class="footer-link" id="instagram" aria-label="Instagram">
                            <i class="fa-brands fa-instagram"></i>
                        </a>
                        <a href="#" class="footer-link" id="facebook" aria-label="Facebook">
                            <i class="fa-brands fa-facebook"></i>
                        </a>
                        <a href="#" class="footer-link" id="whatsapp" aria-label="WhatsApp">
                            <i class="fa-brands fa-whatsapp"></i>
                        </a>
                    </div>
                </div>

            </div>

            <div id="footer_copyright">
                &copy; 2026 &mdash; Todos os direitos reservados
            </div>
        </div>
    </footer>

</body>
</html>

  

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Mensagem enviada com sucesso! (Simulação)');
            this.reset();
        });
