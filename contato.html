<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Yab Curves</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <link href="contato.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #mensagem-sucesso {
            margin-top: 20px;
            background: #fff;
            border: 1px solid #ddd;
            border-left: 4px solid #e8177a;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div id="nav_logo">
            <img src="yab_logo_branco.png" alt="logo Yab Moda Plus Size" width="50" height="50">
        </div>
        <ul>
            <li><a href="home.html">Inicial</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="sobre.html">Sobre-Nós</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
        <div class="nav_spacer"></div>
    </nav>

    <div class="container">
        <div class="heading">
            <h2>Contato</h2>
        </div>
        <form class="form" id="contactForm">
            <label>Nome</label>
            <input type="text" name="Nome" placeholder="Informe seu nome" required>
            <label>E-mail</label>
            <input type="email" name="email" placeholder="Informe seu email" required>
            <label>Mensagem</label>
            <textarea name="mensagem" rows="4" required></textarea>
            <button type="submit">Enviar</button>
        </form>

        <!-- ✅ DENTRO do .container, logo após o form -->
        <div id="mensagem-sucesso">
            ✅ Mensagem enviada com sucesso!
        </div>
    </div>

    <main></main>

    <footer>
        <div id="footer_content">
            <div id="footer_contacts">
                <div id="footer_logo">
                    <img src="yab_logo_rosa.png.png" alt="Logo YAB Moda Plus Size" width="130" height="130">
                </div>
                <div id="footer_center">
                    <ul class="footer-list">
                        <li><a href="home.html">Inicial</a></li>
                        <li><a href="produtos.html">Produtos</a></li>
                        <li><a href="sobre.html">Sobre-Nós</a></li>
                        <li><a href="contato.html">Contato</a></li>
                    </ul>
                    <div id="footer_social_midia">
                        <a href="https://www.instagram.com/yabcurves/" class="footer-link" id="instagram" aria-label="Instagram">
                            <i class="fa-brands fa-instagram"></i>
                        </a>
                        <a href="https://www.facebook.com/share/1EVE8YNnXW/" class="footer-link" id="facebook" aria-label="Facebook">
                            <i class="fa-brands fa-facebook"></i>
                        </a>
                        <a href="https://api.whatsapp.com/send?phone=5535991159481" class="footer-link" id="whatsapp" aria-label="WhatsApp">
                            <i class="fa-brands fa-whatsapp"></i>
                        </a>
                    </div>
                </div>
            </div>
            <div id="footer_copyright">
                &copy; 2026 &mdash; Todos os direitos reservados
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var msg = document.getElementById('mensagem-sucesso');
            msg.style.display = 'block';

            setTimeout(function() {
                msg.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
